name: CI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  checks: write
  packages: read
  pull-requests: write
  security-events: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        runner-os: [windows-latest, ubuntu-latest, macos-latest]
        language: [ csharp, actions ]

    runs-on: ${{ matrix.runner-os }}

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - uses: extractions/setup-just@v3

      # Disabled due an warning whem used in a organization repository
      # "Caught an exception while gathering information for telemetry: HttpError: Resource not accessible by integration"
      # - name: Initialize CodeQL
      #   uses: github/codeql-action/init@v3
      #   if: matrix.runner-os == 'ubuntu-latest'
      #   with:
      #     languages: ${{ matrix.language }}
      #     queries: +security-and-quality
      #     config-file: ./.github/codeql/codeql-config.yml

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          global-json-file: global.json

      - name: Add NuGet source
        run: just add-nuget-source ${{ secrets.GITHUB_TOKEN }}

      - name: Restore dependencies
        run: just restore

      - name: dotnet format
        run: just format-check

      - name: Build
        run: just build

      - name: Unit Test
        run: just test-coverage

      - name: Copy Coverage To Predictable Location
        if: always() && matrix.runner-os == 'ubuntu-latest' && matrix.language == 'csharp'
        run: cp coverage/**/coverage.cobertura.xml coverage/coverage.cobertura.xml

      - name: Code Coverage Summary Report
        uses: irongut/CodeCoverageSummary@v1.3.0
        if: always() && matrix.runner-os == 'ubuntu-latest' && matrix.language == 'csharp'
        with:
          filename: coverage/coverage.cobertura.xml
          badge: true
          format: "markdown"
          output: "both"

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2.23.0
        if: always() && matrix.runner-os == 'ubuntu-latest' && matrix.language == 'csharp'
        with:
          files: "**/unit-tests.xml"
          check_name: "Unit Test Results"
          comment_mode: off
          commit: ${{ env.PR_SHA }}

      # This is used by the subsequent publish-test-results.yml
      - name: Upload Unit Test Results
        uses: actions/upload-artifact@v7
        if: always() && matrix.runner-os == 'ubuntu-latest' && matrix.language == 'csharp'
        with:
          name: Unit Test Results
          path: tests/bbc2gh.Tests/unit-tests.xml

      # This is used by the subsequent publish-test-results.yml
      - name: Upload Code Coverage Report
        uses: actions/upload-artifact@v7
        if: always() && matrix.runner-os == 'ubuntu-latest' && matrix.language == 'csharp'
        with:
          name: Code Coverage Report
          path: code-coverage-results.md

      # Disabled due an warning whem used in a organization repository
      # "Caught an exception while gathering information for telemetry: HttpError: Resource not accessible by integration"
      # - name: Perform CodeQL Analysis
      #   uses: github/codeql-action/analyze@v3
      #   if: matrix.runner-os == 'ubuntu-latest'

  upload-event-file:
    runs-on: ubuntu-latest
    steps:
      # This is used by the subsequent publish-test-results.yaml
      - name: Upload Event File
        uses: actions/upload-artifact@v7
        with:
          name: Event File
          path: ${{ github.event_path }}

  build-for-e2e-test:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.owner.login == 'gh-migration-tools'
    strategy:
      fail-fast: false
      matrix:
        target-os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - uses: extractions/setup-just@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          global-json-file: global.json

      - name: Add NuGet source
        run: just add-nuget-source ${{ secrets.GITHUB_TOKEN }}

      - name: Build Artifacts (Linux)
        if: matrix.target-os == 'ubuntu-latest'
        run: just publish-linux

      - name: Build Artifacts (Windows)
        if: matrix.target-os == 'windows-latest'
        run: just publish-windows

      - name: Build Artifacts (MacOS)
        if: matrix.target-os == 'macos-latest'
        run: just publish-macos

      - name: Upload Binaries
        uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.target-os }}
          path: |
            dist/linux-x64/bbc2gh-linux-amd64
            dist/osx-x64/bbc2gh-darwin-amd64
            dist/win-x64/bbc2gh-windows-amd64.exe

  e2e-test:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.owner.login == 'gh-migration-tools'
    needs: [build-for-e2e-test]
    strategy:
      fail-fast: false
      matrix:
        runner-os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.runner-os }}
    concurrency: integration-test-${{ matrix.runner-os }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          global-json-file: global.json

      - name: Download Binaries
        uses: actions/download-artifact@v8.0.1
        with:
          name: binaries-${{ matrix.runner-os }}
          path: dist

      - name: Copy binary to root (linux)
        if: matrix.runner-os == 'ubuntu-latest'
        run: |
          New-Item -Path "./" -Name "gh-bbc2gh" -ItemType "directory"
          Copy-Item ./dist/linux-x64/bbc2gh-linux-amd64 ./gh-bbc2gh/gh-bbc2gh
        shell: pwsh

      - name: Copy binary to root (windows)
        if: matrix.runner-os == 'windows-latest'
        run: |
          New-Item -Path "./" -Name "gh-bbc2gh" -ItemType "directory"
          Copy-Item ./dist/win-x64/bbc2gh-windows-amd64.exe ./gh-bbc2gh/gh-bbc2gh.exe
        shell: pwsh

      - name: Copy binary to root (macos)
        if: matrix.runner-os == 'macos-latest'
        run: |
          New-Item -Path "./" -Name "gh-bbc2gh" -ItemType "directory"
          Copy-Item ./dist/osx-x64/bbc2gh-darwin-amd64 ./gh-bbc2gh/gh-bbc2gh
        shell: pwsh

      - name: Set execute permissions
        run: |
          chmod +x ./gh-bbc2gh/gh-bbc2gh

      - name: Install gh-bbc2gh extension
        run: gh extension install .
        shell: pwsh
        working-directory: ./gh-bbc2gh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, e2e-test]
    environment: PUBLISH_RELEASE

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - uses: extractions/setup-just@v3

      - name: Validate tag on main
        shell: pwsh
        run: |
          git checkout main
          $mainsha = $(git show-ref refs/heads/main --hash)
          $tagsha = $(git show-ref ${{ github.ref }} --hash)

          Write-Output "refs/heads/main: $mainsha"
          Write-Output "${{ github.ref }}: $tagsha"

          if ($mainsha -ne $tagsha) {
            Write-Error "tag must match HEAD of main"
            exit 1
          }

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          global-json-file: global.json

      - name: Add NuGet source
        run: just add-nuget-source ${{ secrets.GITHUB_TOKEN }}

      - name: Build Artifacts
        run: ./publish.ps1
        shell: pwsh
        env:
          CLI_VERSION: ${{ github.ref }}

      - name: Create gh-bbc2gh Release
        uses: softprops/action-gh-release@v2.6.1
        with:
          body_path: ./RELEASENOTES.md
          files: |
            ./dist/bbc2gh.*.win-x64.zip
            ./dist/bbc2gh.*.win-x86.zip
            ./dist/bbc2gh.*.linux-x64.tar.gz
            ./dist/bbc2gh.*.osx-x64.tar.gz
            ./dist/win-x64/bbc2gh-windows-amd64.exe
            ./dist/win-x86/bbc2gh-windows-386.exe
            ./dist/linux-x64/bbc2gh-linux-amd64
            ./dist/osx-x64/bbc2gh-darwin-amd64

      - name: Archive Release Notes
        shell: pwsh
        run: |
          $DIR_PATH = "./releasenotes"
          $TAG_NAME = "${{ github.ref }}".Substring(10)

          if (-Not (Test-Path -Path $DIR_PATH -PathType Container)) {
              New-Item -ItemType Directory -Path $DIR_PATH
          }

          Get-Content ./RELEASENOTES.md | Out-File -FilePath $DIR_PATH/$TAG_NAME.md
          "" | Out-File ./RELEASENOTES.md

      - name: Update LATEST-VERSION.TXT
        shell: pwsh
        run: |
          $TAG_NAME = "${{ github.ref }}".Substring(10)
          $TAG_NAME | Out-File ./LATEST-VERSION.txt

      - name: Commit Release Notes and Version
        uses: stefanzweifel/git-auto-commit-action@v7.1.0
        with:
          commit_message: Automated commit of archived release notes and version file [skip ci]
          file_pattern: RELEASENOTES.md releasenotes/*.md LATEST-VERSION.txt
          branch: main
